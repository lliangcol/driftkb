name: Feature request
description: Suggest an improvement to DriftKB.
title: "[feature] "
labels: ["feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What workflow pain or limitation are you hitting?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - CLI
        - Validation
        - Verify blocks
        - Fingerprints
        - Gaps
        - Adapters
        - Hooks
        - Reporting
        - Packaging
        - Documentation
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: context
    attributes:
      label: Extra context
      description: Real repo scenario, example config, or target language.
