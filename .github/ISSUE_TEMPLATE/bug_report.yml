name: Bug report
description: Report a reproducible DriftKB problem.
title: "[bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include a minimal reproduction.
  - type: input
    id: version
    attributes:
      label: DriftKB version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Python version, install method, and shell.
      placeholder: "Windows 11, Python 3.12, pipx, PowerShell"
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      placeholder: "driftkb validate --profile enterprise-java"
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include repo structure, sample KB/config files, and relevant output.
    validations:
      required: true
