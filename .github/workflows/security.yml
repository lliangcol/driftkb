name: Security

on:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "23 3 * * 1"

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]" pip-audit
      - run: python -m pip_audit
