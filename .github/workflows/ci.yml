name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest
      - run: python -m build --outdir "${{ runner.temp }}/dist"
      - run: python -m pip install --force-reinstall "${{ runner.temp }}"/dist/*.whl
      - run: driftkb version
      - run: driftkb validate
        working-directory: examples/minimal
